<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gesture-Controlled Holographic Geometry Builder</title>
    <style>
      :root {
        --bg: #020607;
        --bg-soft: rgba(4, 18, 24, 0.88);
        --panel: rgba(4, 20, 25, 0.74);
        --line: rgba(0, 238, 255, 0.26);
        --text: #c9fbff;
        --text-dim: rgba(201, 251, 255, 0.66);
        --cyan: #00f4ff;
        --cyan-soft: rgba(0, 244, 255, 0.18);
        --danger: #ff6d81;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 50%, rgba(0, 255, 255, 0.05), transparent 34%),
          radial-gradient(circle at 50% 50%, rgba(0, 180, 255, 0.04), transparent 58%),
          linear-gradient(180deg, #010304 0%, #020607 40%, #010304 100%);
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #hologram {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .corner-panel {
        position: absolute;
        backdrop-filter: blur(10px);
        background: linear-gradient(180deg, rgba(0, 30, 34, 0.7), rgba(2, 8, 10, 0.56));
        border: 1px solid var(--line);
        box-shadow:
          0 0 26px rgba(0, 255, 255, 0.12),
          inset 0 0 18px rgba(0, 255, 255, 0.06);
      }

      #hud {
        top: 18px;
        left: 18px;
        width: 320px;
        padding: 16px 18px;
        border-radius: 18px;
      }

      #hud h1 {
        margin: 0 0 10px;
        font-size: 1rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--cyan);
      }

      #hud .metric {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 6px 0;
        border-bottom: 1px solid rgba(0, 255, 255, 0.08);
        font-size: 0.9rem;
      }

      #hud .metric:last-child {
        border-bottom: 0;
      }

      #hud .value {
        color: var(--text);
        font-weight: 700;
      }

      #toast {
        position: absolute;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        min-width: 220px;
        padding: 12px 16px;
        border-radius: 999px;
        text-align: center;
        background: rgba(0, 12, 15, 0.78);
        border: 1px solid rgba(0, 255, 255, 0.18);
        color: var(--text);
        box-shadow: 0 0 28px rgba(0, 255, 255, 0.12);
        opacity: 0;
        transition: opacity 200ms ease, transform 200ms ease;
      }

      #toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(-4px);
      }

      #centerMarker {
        position: absolute;
        left: 50%;
        top: 50%;
        width: min(22vw, 300px);
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 1px dashed rgba(0, 255, 255, 0.12);
        box-shadow: inset 0 0 18px rgba(0, 255, 255, 0.05);
        pointer-events: none;
      }

      #centerMarker::before,
      #centerMarker::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 255, 255, 0.12);
      }

      #centerMarker::before {
        width: 1px;
        height: 100%;
      }

      #centerMarker::after {
        width: 100%;
        height: 1px;
      }

      #centerMarker .label {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 75%;
        text-align: center;
        color: rgba(201, 251, 255, 0.72);
        font-size: 0.84rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        line-height: 1.45;
      }

      @media (max-width: 900px) {
        #hud {
          width: min(280px, calc(100vw - 24px));
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="hologram"></canvas>

      <div id="hud" class="corner-panel">
        <h1>Holographic Geometry Builder</h1>
        <div class="metric"><span>Connection</span><span class="value" id="wsStatus">Connecting</span></div>
        <div class="metric"><span>Mode</span><span class="value" id="modeValue">Single Hologram</span></div>
        <div class="metric"><span>Active Shape</span><span class="value" id="shapeValue">Cube</span></div>
        <div class="metric"><span>Selected Object</span><span class="value" id="selectedValue">None</span></div>
        <div class="metric"><span>Objects</span><span class="value" id="objectCount">0</span></div>
        <div class="metric"><span>Right Gesture</span><span class="value" id="rightGesture">Idle</span></div>
        <div class="metric"><span>Left Gesture</span><span class="value" id="leftGesture">Idle</span></div>
      </div>

      <div id="centerMarker" aria-hidden="true">
        <div class="label">45-Degree Reflector Zone</div>
      </div>

      <div id="toast" role="status" aria-live="polite"></div>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
